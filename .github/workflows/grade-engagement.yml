name: 📊 Grade Engagement

on:
  schedule:
    - cron: "0 8 * * *"   # Once daily at 08:00 UTC (11:00 IL)
  workflow_dispatch:

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Run engagement grader
        run: npm run grade-engagement
        env:
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated state
        run: |
          git config user.name  "seahawks-bot[bot]"
          git config user.email "bot@noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update engagement grades [skip ci]"
          git push origin main || (git pull --rebase origin main && git push origin main)
