name: 🦅 Tweet — Seahawks Opinion Bot

on:
  schedule:
    - cron: "0 */2 * * *"  # Every 2 hours — IL time window enforced in code
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually post)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      quote_tweet_id:
        description: "Tweet ID to quote (optional)"
        required: false
        default: ""
      force_run:
        description: "Force run outside IL hours (for testing)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      quote_tweet_text:
        description: "Text of the tweet being quoted"
        required: false
        default: ""
      quote_tweet_author:
        description: "Author handle of quoted tweet"
        required: false
        default: ""

concurrency:
  group: tweet-job
  cancel-in-progress: true

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tweet job
        run: npm run tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          QUOTE_TWEET_ID: ${{ github.event.inputs.quote_tweet_id || '' }}
          QUOTE_TWEET_TEXT: ${{ github.event.inputs.quote_tweet_text || '' }}
          QUOTE_TWEET_AUTHOR: ${{ github.event.inputs.quote_tweet_author || '' }}

      - name: Upload tweet log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweet-log-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Commit updated state
        run: |
          git config user.name  "seahawks-bot[bot]"
          git config user.email "bot@noreply.github.com"
          git fetch origin main
          git checkout origin/main -- state.json 2>/dev/null || true
          # Merge remote tweets-db.json with local (avoid overwriting remote tweets)
          node -e "
            const fs = require('fs');
            const path = 'tweets-db.json';
            try {
              const local  = JSON.parse(fs.readFileSync(path, 'utf-8'));
              const remote = JSON.parse(require('child_process').execSync('git show origin/main:tweets-db.json 2>/dev/null || echo null').toString().trim() || 'null');
              if (remote && remote.tweets) {
                const ids = new Set(local.tweets.map(t => t.id));
                const merged = [...local.tweets];
                for (const t of remote.tweets) { if (!ids.has(t.id)) merged.push(t); }
                merged.sort((a,b) => new Date(b.posted_at) - new Date(a.posted_at));
                local.tweets = merged;
                fs.writeFileSync(path, JSON.stringify(local, null, 2));
                console.log('Merged tweets-db: ' + merged.length + ' total');
              }
            } catch(e) { console.log('tweets-db merge skipped:', e.message); }
          "
          git add state.json tweets-db.json logs/
          git diff --staged --quiet || git commit -m "chore: update state after tweet [skip ci]"
          git push --force-with-lease origin main || (git pull --rebase origin main && git push origin main)

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_USER }}
          subject: "🚨 Seahawks Bot failed — ${{ github.run_id }}"
          body: |
            The tweet job failed.
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
